<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Error // IndustrialTech</title>
    <link rel="stylesheet" href="root.css">
        <link rel="stylesheet" href="error.css">

</head>
<body>
    <div class="error-wrapper">
        <main class="container error-container">
            <div class="error-visual">
                <div class="alert-icon">
                    <div class="icon-triangle"></div>
                    <div class="icon-bang">!</div>
                </div>
                <div class="error-code">CODE: 404</div>
            </div>
            
            <div class="error-content">
                <h1 class="error-title">SYSTEM MALFUNCTION</h1>
                <p class="error-message">
                    The mechanical path or data node you requested could not be located on the production line. The asset may have been decommissioned, relocated, or temporarily brought offline for technical maintenance.
                </p>
                <div class="btn-group">
                    <a href="index.html" class="btn btn-primary">Return To Control Panel</a>
                    <!-- <a href="#support" class="btn btn-secondary">Report Telemetry Fault</a> -->
                </div>
            </div>
        </main>
    </div>
</body>
</html>
